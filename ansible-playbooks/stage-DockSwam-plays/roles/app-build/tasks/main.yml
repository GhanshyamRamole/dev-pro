---
# tasks file for app-build

- name: Add 'itadmin' user to the docker group
  user:
    name: "{{ docker_user }}"
    groups: docker
    append: yes
  become: yes

- name: Create project directory with correct ownership
  file:
    path: "{{ project_path }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: '0755'
  become: yesi

- name: Copy build artifacts to server
  copy:
    src: "{{ item }}"
    dest: "{{ project_path }}/"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: '0644'
  loop:
    - Dockerfile
    - webapp/target/webapp.war
  become: yes

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  become: yes
  become_user: "{{ docker_user }}"

- name: Build and Push Docker image
  community.docker.docker_image:
    name: "{{ image_name }}"
    tag: "{{ image_tag }}"
    source: build
    build:
      path: "{{ build_path }}"
      nocache: yes
    push: yes
  become: yes
  become_user: "{{ docker_user }}"

