---
- name: Build and Push Docker Image to Docker Hub
  hosts: docker-server
  become: yes
  vars_files:
    - vars.yml
    - passwd.yml

  tasks:
    - name: Installation of Docker 
      yum:
        name: docker
        state: present

    - name: docker service enabled and running 
      service:
        name: docker
        state: started
        enabled: yes

    - name: Adding 'itadmin' user is in the docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Create project directory with correct ownership
      file:
        path: "{{ project_path }}"
        state: directory
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"
        mode: '0755'

    - name: Copy build artifacts to server
      copy:
        src: "{{ item }}"
        dest: "{{ project_path }}/"
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"
      loop:
        - Dockerfile
        - webapp.war

    - name: Log in to Docker Hub
      docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
      become_user: "{{ docker_user }}"

    - name: Build and push Docker image
      docker_image:
        build:
          path: "{{ project_path }}"
        name: "{{ dockerhub_username }}/{{ image_name }}"
        tag: "{{ image_tag }}"
        push: yes
        source: build
      become_user: "{{ docker_user }}"

    - name: Clean up local sensitive files
      file:
        path: "~/.docker/config.json"
        state: absent
