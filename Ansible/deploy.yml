---
- name: Managed Kubernetes Deployment
  hosts: kubecluster
  vars:
    manifest_path: "/home/itadmin/k8s-manifests"
    namespace: "default"
  
  tasks:
    - name: Ensure manifest directory exists
      file:
        path: "{{ manifest_path }}"
        state: directory

    - name: Copy manifests to the master node
      copy:
        src: "{{ item }}"
        dest: "{{ manifest_path }}/"
      loop:
        - deployment.yml
        - service.yml

    - name: Deploy Application and Service
      kubernetes.core.k8s:
        state: present
        src: "{{ manifest_path }}/{{ item }}"
        namespace: "{{ namespace }}"
        wait: yes 
      loop:
        - deployment.yml
        - service.yml

    - name: Retrieve Service Details
      kubernetes.core.k8s_info:
        kind: Service
        name: taskapp-service
        namespace: "{{ namespace }}"
      register: service_info

    - name: Display LoadBalancer External IP/DNS
      debug:
        msg: 
          - "Access the application at: http://{{ service_info.resources[0].status.loadBalancer.ingress[0].hostname }}/webapp"
          - "Note: It may take a few minutes for the AWS DNS to propagate."
      when: service_info.resources[0].status.loadBalancer.ingress is defined
